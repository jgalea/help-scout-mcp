version: 2
updates:
  # npm dependencies — weekly, with security patches grouped.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    groups:
      security-patches:
        applies-to: security-updates
        update-types:
          - "patch"
          - "minor"
      dev-deps:
        dependency-type: "development"
        update-types:
          - "patch"
          - "minor"
    ignore:
      # Pin Node @types to 20.x; bump intentionally.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — weekly. SHA-pinning happens in workflow files;
  # Dependabot updates the SHA + comment.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
