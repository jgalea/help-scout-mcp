name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run type-check
      - run: npm run lint
      - run: npm run build
      - run: npm test
        env:
          CI: 'true'

  audit:
    name: npm audit (production deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - name: Audit production deps
        run: npm audit --omit=dev --audit-level=moderate

  secret-scan:
    name: Secret scan (full repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Stage all tracked files for scanning
        run: |
          set -uo pipefail
          git ls-files | xargs -I{} sh -c 'git add "{}" 2>/dev/null || true'

      - name: Run pre-commit secret scan
        run: bash scripts/pre-commit-secret-scan.sh
